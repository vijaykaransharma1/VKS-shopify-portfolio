    // =============================================
    // TYPEWRITER HOOK
    // =============================================
    function useTypewriter(texts, speed = 80, pause = 2000) {
      const [displayText, setDisplayText] = useState('');
      const [isDeleting, setIsDeleting] = useState(false);
      const [textIndex, setTextIndex] = useState(0);
      const [charIndex, setCharIndex] = useState(0);

      useEffect(() => {
        const currentText = texts[textIndex];
        let timer;

        if (!isDeleting && charIndex < currentText.length) {
          timer = setTimeout(() => setCharIndex(c => c + 1), speed);
        } else if (!isDeleting && charIndex === currentText.length) {
          timer = setTimeout(() => setIsDeleting(true), pause);
        } else if (isDeleting && charIndex > 0) {
          timer = setTimeout(() => setCharIndex(c => c - 1), speed / 2);
        } else if (isDeleting && charIndex === 0) {
          setIsDeleting(false);
          setTextIndex(i => (i + 1) % texts.length);
        }

        setDisplayText(currentText.slice(0, charIndex));
        return () => clearTimeout(timer);
      }, [charIndex, isDeleting, textIndex, texts, speed, pause]);

      return displayText;
    }

    // =============================================
    // SCROLL REVEAL HOOK  (MutationObserver version)
    // =============================================
    function useScrollReveal() {
      useEffect(() => {
        const SELECTOR = '.reveal, .reveal-left, .reveal-right, .reveal-scale';

        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach(entry => {
              if (entry.isIntersecting) {
                entry.target.classList.add('visible');
                io.unobserve(entry.target); // stop watching once visible
              }
            });
          },
          { threshold: 0.08, rootMargin: '0px 0px -30px 0px' }
        );

        // Helper: observe all current + future reveal elements
        const observeAll = () => {
          document.querySelectorAll(SELECTOR).forEach(el => {
            // If already in view (e.g. above fold), make visible immediately
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight && rect.bottom > 0) {
              el.classList.add('visible');
            } else {
              io.observe(el);
            }
          });
        };

        observeAll();

        // Watch for new elements added to DOM (filter changes re-render cards)
        const mo = new MutationObserver(() => observeAll());
        mo.observe(document.body, { childList: true, subtree: true });

        return () => { io.disconnect(); mo.disconnect(); };
      }, []);
    }

    // =============================================
    // STAT COUNTER HOOK
    // =============================================
    function useCountUp(target, duration = 1800) {
      const [count, setCount] = useState(0);
      const ref = useRef(null);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            if (entries[0].isIntersecting) {
              const numTarget = parseInt(target.replace(/\D/g, '')) || 0;
              const start = Date.now();
              const tick = () => {
                const elapsed = Date.now() - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                setCount(Math.round(eased * numTarget));
                if (progress < 1) requestAnimationFrame(tick);
              };
              requestAnimationFrame(tick);
              observer.disconnect();
            }
          },
          { threshold: 0.5 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [target, duration]);

      return { count, ref };
    }

    // =============================================
    // STAT CARD COMPONENT
    // =============================================
    function StatCard({ stat }) {
      const { count, ref } = useCountUp(stat.number);
      const suffix = stat.number.replace(/\d/g, '');

      return (
        <div className="stat-card reveal" ref={ref}>
          <div className="stat-number">{count}{suffix}</div>
          <div className="stat-label">{stat.label}</div>
        </div>
      );
    }
