                    </div>
                    <div className="project-body">
                      <h3 className="project-title">{project.title}</h3>
                      <p className="project-desc">{project.desc}</p>
                      <div className="project-tags">
                        {project.tech.map((t, tIdx) => (
                          <span key={tIdx} className="project-tag">{t}</span>
                        ))}
                      </div>
                      <div className="project-links">
                        <a href="#contact" onClick={(e) => { e.preventDefault(); handleNavClick('contact'); }} className="project-link">
                          Inquire Details <i className="fa-solid fa-arrow-up-right-from-square"></i>
                        </a>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* Education & Languages (Side by side grid) */}
          <section id="about-edu" style={{ backgroundColor: 'var(--bg-secondary)', borderTop: '1px solid var(--border-color)', borderBottom: '1px solid var(--border-color)' }}>
            <div className="container misc-grid">
              
              {/* Education Card */}
              <div className="misc-card">
                <h2 className="misc-title">
                  <i className="fa-solid fa-graduation-cap"></i> Education
                </h2>
                <div className="edu-item">
                  <div className="edu-header">
                    <h3 className="edu-degree">{RESUME_DATA.education.degree}</h3>
                    <span className="edu-date">
                      <i className="fa-regular fa-calendar-days" style={{ marginRight: '6px' }}></i>
                      {RESUME_DATA.education.duration}
                    </span>
                  </div>
                  <div className="edu-school">{RESUME_DATA.education.school}</div>
                  <div className="edu-desc">Relevant academic focus and skillset development:</div>
                  <ul className="edu-bullets">
                    {RESUME_DATA.education.bullets.map((bullet, idx) => (
                      <li key={idx} style={{ marginBottom: '6px' }}>{bullet}</li>
                    ))}
                  </ul>
                </div>
              </div>

              {/* Languages Card */}
              <div className="misc-card">
                <h2 className="misc-title">
                  <i className="fa-solid fa-language"></i> Languages
                </h2>
                {RESUME_DATA.languages.map((lang, idx) => (
                  <div key={idx} className="language-item">
                    <div className="lang-header">
                      <span className="lang-name">{lang.name}</span>
                      <span className="lang-level">{lang.level}</span>
                    </div>
                    <div className="dots-container">
                      {[...Array(5)].map((_, i) => (
                        <div key={i} className={`dot ${i < lang.score ? 'active' : ''}`}></div>
                      ))}
                    </div>
                  </div>
                ))}

                <div style={{ marginTop: '40px', padding: '16px', background: 'var(--bg-tertiary)', borderRadius: 'var(--border-radius-md)', border: '1px solid var(--border-color)' }}>
                  <h4 style={{ marginBottom: '8px', fontSize: '0.95rem', fontWeight: '700' }}><i className="fa-solid fa-location-crosshairs" style={{ color: 'var(--accent-color)', marginRight: '6px' }}></i> Location Focus</h4>
                  <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Based in Joginder Nagar, Himachal Pradesh, India. Open to Remote positions and freelance consultations worldwide.</p>
                </div>
              </div>

            </div>
          </section>

          {/* Contact & Contact Form Section */}
          <section id="contact">
            <div className="container">
              <div className="section-header">
                <span className="section-tag">Let's Connect</span>
                <h2 className="section-title">Hire Me / Get In Touch</h2>
                <p className="section-desc">Have a Shopify store that needs theme coding, custom sections, or speed optimization? Reach out now!</p>
              </div>

              <div className="contact-grid">
                
                {/* Communication details */}
                <div className="contact-info">
                  <div className="info-card">
                    <div className="info-icon">
                      <i className="fa-solid fa-envelope"></i>
                    </div>
                    <div className="info-details">
                      <div>Email Address</div>
                      <a href={`mailto:${RESUME_DATA.profile.email}`}>{RESUME_DATA.profile.email}</a>
                    </div>
                  </div>

                  <div className="info-card">
                    <div className="info-icon">
                      <i className="fa-solid fa-phone"></i>
                    </div>
                    <div className="info-details">
                      <div>Call / WhatsApp</div>
                      <a href={`tel:${RESUME_DATA.profile.phone}`}>{RESUME_DATA.profile.phone}</a>
                    </div>
                  </div>

                  <div className="info-card">
                    <div className="info-icon">
                      <i className="fa-solid fa-location-dot"></i>
                    </div>
                    <div className="info-details">
                      <div>Current Location</div>
                      <p>{RESUME_DATA.profile.location}</p>
                    </div>
                  </div>

                  <div className="info-card">
                    <div className="info-icon">
                      <i className="fa-brands fa-shopify" style={{ color: '#96bf48' }}></i>
                    </div>
                    <div className="info-details">
                      <div>Specialization</div>
                      <p>Custom Liquid Code & Theme Architecture</p>
                    </div>
                  </div>
                </div>

                {/* Interactive Contact Form */}
                <div className="contact-form-card">
                  {submitSuccess ? (
                    <div className="form-success-alert">
                      <i className="fa-regular fa-circle-check"></i>
                      <h3>Message Sent Successfully!</h3>
                      <p>Thank you for reaching out, Vijay. I will get back to you within 24 hours.</p>
                      <button onClick={() => setSubmitSuccess(false)} className="btn-secondary" style={{ marginTop: '16px', padding: '8px 16px', fontSize: '0.9rem' }}>
                        Send Another Message
                      </button>
                    </div>
                  ) : (
                    <form onSubmit={handleFormSubmit}>
                      {formError && (
                        <div style={{ color: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', border: '1px solid #ef4444', padding: '12px', borderRadius: 'var(--border-radius-sm)', marginBottom: '20px', fontSize: '0.9rem' }}>
                          <i className="fa-solid fa-circle-exclamation" style={{ marginRight: '6px' }}></i> {formError}
                        </div>
                      )}
                      
                      <div className="form-group-row">
                        <div className="form-group">
                          <label className="form-label">Full Name</label>
                          <input 
                            type="text" 
                            className="form-control" 
                            placeholder="e.g. John Doe"
                            value={formState.name}
                            onChange={(e) => setFormState({...formState, name: e.target.value})}
                          />
                        </div>
                        <div className="form-group">
                          <label className="form-label">Email Address</label>
                          <input 
                            type="email" 
                            className="form-control" 
                            placeholder="e.g. john@example.com"
                            value={formState.email}
                            onChange={(e) => setFormState({...formState, email: e.target.value})}
                          />
                        </div>
                      </div>

                      <div className="form-group">
                        <label className="form-label">Subject</label>
                        <input 
                          type="text" 
                          className="form-control" 
                          placeholder="e.g. Speed Optimization Project"
                          value={formState.subject}
                          onChange={(e) => setFormState({...formState, subject: e.target.value})}
                        />
                      </div>

                      <div className="form-group">
                        <label className="form-label">Project Details / Message</label>
                        <textarea 
                          className="form-control" 
                          placeholder="Describe the Shopify features, custom layouts or bugs you need help with..."
                          value={formState.message}
                          onChange={(e) => setFormState({...formState, message: e.target.value})}
                        ></textarea>
                      </div>

                      <button type="submit" disabled={isSubmitting} className="form-btn">
                        {isSubmitting ? (
                          <>
                            <i className="fa-solid fa-spinner fa-spin"></i> Sending Message...
                          </>
                        ) : (
                          <>
                            Send Message <i className="fa-solid fa-paper-plane"></i>
                          </>
                        )}
                      </button>
                    </form>
                  )}
                </div>

              </div>
            </div>
          </section>

          {/* Footer */}
          <footer className="footer">
            <div className="container">
              <div className="footer-logo">
                <i className="fa-brands fa-shopify"></i>
                <span>Vijay Karan Sharma</span>
              </div>
              <div className="footer-nav">
                <a href="#home" onClick={(e) => { e.preventDefault(); handleNavClick('home'); }} className="footer-link">Home</a>
                <a href="#skills" onClick={(e) => { e.preventDefault(); handleNavClick('skills'); }} className="footer-link">Skills</a>
                <a href="#experience" onClick={(e) => { e.preventDefault(); handleNavClick('experience'); }} className="footer-link">Experience</a>
                <a href="#projects" onClick={(e) => { e.preventDefault(); handleNavClick('projects'); }} className="footer-link">Projects</a>
                <a href="#contact" onClick={(e) => { e.preventDefault(); handleNavClick('contact'); }} className="footer-link">Contact</a>
              </div>
              <p className="footer-copy">
                &copy; {new Date().getFullYear()} Vijay Karan Sharma. All Rights Reserved. Built with React & Custom CSS.
              </p>
            </div>
          </footer>
        </div>
      );
    }

    // Mount React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
